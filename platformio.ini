[env:waveshare_esp32s3_21]
framework = arduino
; Arduino 3.1.1 + Espressif high-perf libs (fixes RGB LCD drift on ESP32-S3)
; Using 54.03.20 which resolves the package-postinstall.py error in 53.03.11
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
platform_packages =
    platformio/framework-arduinoespressif32@https://github.com/espressif/arduino-esp32.git#3.1.1
    platformio/framework-arduinoespressif32-libs@https://dl.espressif.com/AE/esp-arduino-libs/esp32-3.1.1-h.zip
board = esp32-s3-devkitc-1

; Flash & PSRAM config for Waveshare ESP32-S3-Touch-LCD-2.1
board_build.flash_size = 16MB
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_build.partitions = partitions_custom.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    -D WIFI_SSID1=\"577EastGrand\"
    -D WIFI_PASS1=\"577EastGrand\"
    -D WIFI_SSID2=\"Pixel_4720\"
    -D WIFI_PASS2=\"1929Orleans\"
    -D WIFI_NAME1=\"577\ Home\"
    -D WIFI_NAME2=\"Pixel\ Hotspot\"
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
    ; No native USB CDC — board uses CH343P
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=0
    ; LVGL + anti-tear (mode 3 = double-buffer + direct mode, required for RGB LCD)
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -DLV_COLOR_16_SWAP=0          ; RGB LCD: no byte swap
    -DLVGL_PORT_AVOID_TEARING_MODE=3
    ; Sensor GPIO
    ; DS18B20 disabled (sensors failed) — outside temp from BLE weather app
    -DPIN_DS18B20=-1
    -DPIN_DHT22=44
    ; Headlight auto-dim (V2)
    -DHEADLIGHT_PIN=-1
    ; Include path
    -I src

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git#v1.1.0
    https://github.com/esp-arduino-libs/esp-lib-utils.git#v0.2.0
    https://github.com/lvgl/lvgl.git#v8.4.0
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0
    bblanchon/ArduinoJson @ ^7.1.0
    h2zero/NimBLE-Arduino @ ^1.4.2
